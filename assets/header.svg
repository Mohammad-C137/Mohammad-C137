<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="330" viewBox="0 0 1200 330" role="img" aria-labelledby="title description">
  <title id="title">Seyedmohammad Mousavi Hashemi</title>
  <desc id="description">Python developer building command-line tools and desktop applications</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.52" stop-color="#111936"/>
      <stop offset="1" stop-color="#24134f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#94a3b8" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="330" rx="28" fill="url(#background)"/>
  <rect width="1200" height="330" rx="28" fill="url(#grid)"/>
  <circle cx="1010" cy="85" r="250" fill="url(#glow)"/>
  <circle cx="190" cy="315" r="180" fill="#8b5cf6" opacity="0.10" filter="url(#soft-glow)"/>

  <g opacity="0.82" font-family="Consolas, 'Courier New', monospace">
    <text x="66" y="82" fill="#64748b" font-size="18">~/github/profile</text>
    <text x="66" y="132" fill="#22d3ee" font-size="27" font-weight="700">&gt; hello_world()</text>
  </g>

  <text x="66" y="202" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="46" font-weight="750" letter-spacing="-1">
    Seyedmohammad Mousavi Hashemi
  </text>
  <text x="68" y="249" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="23" letter-spacing="0.4">
    Python tools  /  desktop applications  /  curious engineering
  </text>
  <rect x="68" y="276" width="445" height="5" rx="2.5" fill="url(#accent)"/>

  <g transform="translate(920 148)" font-family="Consolas, 'Courier New', monospace" font-weight="700">
    <text x="0" y="0" fill="#22d3ee" font-size="68">{</text>
    <text x="56" y="0" fill="#a78bfa" font-size="42">code</text>
    <text x="172" y="0" fill="#22d3ee" font-size="68">}</text>
    <circle cx="116" cy="55" r="5" fill="#22d3ee"/>
    <circle cx="140" cy="55" r="5" fill="#818cf8"/>
    <circle cx="164" cy="55" r="5" fill="#c084fc"/>
  </g>

  <rect x="0" y="324" width="1200" height="6" fill="url(#accent)"/>
</svg>
